<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Byteforce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="flash-overlay" id="flashOverlay"></div>

  <div class="app-wrapper">

    <!-- HEADER -->
    <header>
      <div class="logo-block">
        <div class="logo-title">DICE FORGE</div>
        <div class="logo-sub">Premium Die Roller</div>
      </div>
      <div class="header-controls">
        <span class="sound-badge on" id="soundToggle" title="Toggle Sound">🔊 SOUND</span>
        <button class="icon-btn" id="themeToggle" title="Toggle Theme">🌙</button>
      </div>
    </header>

    <div class="main-grid">

      <!-- LEFT COLUMN -->
      <div>

        <!-- CONTROLS CARD -->
        <div class="card" style="margin-bottom:20px">
          <div class="card-title">Configuration</div>
          <div class="controls-row">

            <div class="control-group">
              <div class="control-label">Number of Dice</div>
              <div class="dice-count-selector" id="diceCountSelector">
                <!-- Generated by JS -->
              </div>
            </div>

            <div class="control-group">
              <div class="control-label">Dice Type</div>
              <div class="type-selector" id="typeSelector">
                <!-- Generated by JS -->
              </div>
            </div>

            <button class="roll-btn" id="rollBtn">⚄ ROLL</button>
          </div>
        </div>

        <!-- DICE ARENA CARD -->
        <div class="card" style="margin-bottom:20px">
          <div class="card-title">Dice Arena</div>
          <div class="dice-arena" id="diceArena">
            <div class="arena-placeholder" id="arenaPlaceholder">
              Select dice and press ROLL
            </div>
          </div>

          <!-- RESULT STATS -->
          <div class="result-panel" id="resultPanel" style="display:none">
            <div class="result-stat">
              <div class="stat-label">Total Sum</div>
              <div class="stat-value" id="statTotal">—</div>
            </div>
            <div class="result-stat">
              <div class="stat-label">Highest</div>
              <div class="stat-value success" id="statHigh">—</div>
            </div>
            <div class="result-stat">
              <div class="stat-label">Lowest</div>
              <div class="stat-value accent" id="statLow">—</div>
            </div>
          </div>

          <div class="roll-count-badge" id="rollCountBadge"></div>
        </div>
      </div>

      <!-- RIGHT SIDEBAR -->
      <div class="sidebar">

        <!-- HISTORY CARD -->
        <div class="card">
          <div class="card-title">Roll History</div>
          <div class="history-list" id="historyList">
            <div class="history-empty" id="historyEmpty">No rolls yet</div>
          </div>
        </div>

        <!-- STATS CARD -->
        <div class="card" id="statsCard" style="display:none">
          <div class="card-title">Session Stats</div>
          <div class="stats-grid">
            <div class="mini-stat">
              <div class="mini-stat-label">Rolls</div>
              <div class="mini-stat-value" id="sTotal">0</div>
            </div>
            <div class="mini-stat">
              <div class="mini-stat-label">Avg Sum</div>
              <div class="mini-stat-value" id="sAvg">—</div>
            </div>
            <div class="mini-stat">
              <div class="mini-stat-label">Best Roll</div>
              <div class="mini-stat-value" id="sBest">—</div>
            </div>
            <div class="mini-stat">
              <div class="mini-stat-label">Worst Roll</div>
              <div class="mini-stat-value" id="sWorst">—</div>
            </div>
          </div>

          <div class="prob-section" style="margin-top:14px" id="probSection">
            <div class="prob-label">Face Frequency (Current Type)</div>
            <div id="probBars"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
